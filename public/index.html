<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Мобильный заказ</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f5f5f7">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div class="success" id="success-message"></div>

  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__left">
        <h1 class="topbar__title">Мобильный заказ</h1>

        <div class="topbar__controls">
          <div class="category-menu-wrap">
            <select class="category-menu" id="category-select">
              <option value="all">Все категории</option>
            </select>
          </div>

          <button class="basket-pill" id="basket-open-btn" type="button">
            <span class="basket-pill__label">Корзина</span>
            <span class="basket-pill__value" id="basket-sum">0 ₽</span>
          </button>
        </div>
      </div>

      <div class="topbar__right">
        <button class="refresh-indicator" id="refresh-btn" type="button" aria-label="Обновить каталог" title="Обновить каталог">
          <span class="refresh-indicator__dot" id="fresh-dot"></span>
        </button>
      </div>
    </div>

    <div class="status" id="status">Загружаем каталог...</div>
  </header>

  <main class="page">
    <div id="catalog-root"></div>
  </main>

  <div class="modal" id="basket-modal" aria-hidden="true">
    <div class="modal__backdrop" id="basket-backdrop"></div>

    <div class="modal__sheet" role="dialog" aria-modal="true" aria-labelledby="basket-title">
      <div class="modal__header">
        <div>
          <div class="modal__title" id="basket-title">Корзина</div>
          <div class="modal__subtitle" id="basket-subtitle">0 товаров</div>
        </div>
        <button class="icon-btn" id="basket-close-btn" type="button" aria-label="Закрыть">✕</button>
      </div>

      <div class="modal__content">
        <div class="basket-list" id="basket-list"></div>
        <div class="basket-empty" id="basket-empty">Корзина пустая</div>

        <div class="form-block">
          <label class="field">
            <span class="field__label">Телефон</span>
            <input class="field__input" id="phone-input" type="tel" placeholder="+7..." inputmode="tel">
          </label>

          <label class="field">
            <span class="field__label">Комментарий</span>
            <textarea class="field__textarea" id="comment-input" placeholder="Комментарий к заказу"></textarea>
          </label>
        </div>
      </div>

      <div class="modal__footer">
        <div class="modal__sum">
          <div class="modal__sum-label">Итого</div>
          <div class="modal__sum-value" id="basket-total-sum">0 ₽</div>
        </div>

        <button class="primary-btn" id="send-order-btn" type="button" disabled>Отправить заказ</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
