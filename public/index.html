<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>Мобильный заказ</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="success" id="success-message"></div>

  <main class="page">
    <div class="topbar">
      <h1 class="topbar__title" id="page-title">Мобильный заказ</h1>
      <div class="topbar__category" id="category-name">Категория</div>

      <div class="topbar__actions">
        <button class="btn" id="refresh-btn" type="button">Актуализировать</button>
      </div>

      <div class="status" id="status">Загружаем каталог...</div>
    </div>

    <section class="grid" id="product-grid"></section>
  </main>

  <div class="bottom-bar">
    <div class="bottom-bar__inner">
      <div class="bottom-bar__meta">
        <div class="bottom-bar__label">Товаров</div>
        <div class="bottom-bar__value" id="total-items">0</div>
      </div>

      <button class="btn btn--ghost-mobile-hide" id="clear-btn" type="button">Очистить</button>
      <button class="btn btn--primary" id="send-order-btn" type="button" disabled>Отправить заявку</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
