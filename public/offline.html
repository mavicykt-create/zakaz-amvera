<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Нет сети</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .box {
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 26px;
    }
    p {
      margin: 0;
      color: #666;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Нет подключения</h1>
    <p>Если каталог уже был загружен раньше, открой приложение еще раз — сохраненные данные должны подтянуться из кеша.</p>
  </div>
</body>
</html>
